<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
  :root{--asphalt:#1c2024;--line:#f4c01e;--paint:#e8e6e0;--paint-dim:#9aa0a6;
    --card:#262b30;--ok:#3ecf8e;--bad:#ef5b5b;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--asphalt);color:var(--paint);
    font-family:'SF Pro Display',system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    padding:24px 18px calc(24px + env(safe-area-inset-bottom));min-height:100%;}
  .top{width:100%;max-width:460px;display:flex;align-items:center;gap:10px}
  .top h1{font-size:18px;font-weight:700;letter-spacing:-.02em}
  .top .tag{font-size:11px;color:var(--paint-dim);font-weight:600;text-transform:uppercase;letter-spacing:.12em}
  .wrap{width:100%;max-width:460px;flex:1;display:flex;flex-direction:column;gap:16px;margin-top:14px}
  .park{position:relative;border:none;cursor:pointer;color:var(--asphalt);
    background:var(--line);border-radius:26px;padding:34px 22px;
    font-family:inherit;text-align:left;overflow:hidden;
    box-shadow:0 14px 40px -12px #f4c01e88;transition:transform .12s;}
  .park:active{transform:scale(.985)}
  .park.busy{opacity:.7;pointer-events:none}
  .park .lbl{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;opacity:.7}
  .park .big{font-size:30px;font-weight:800;letter-spacing:-.03em;margin-top:4px}
  .park .stripes{position:absolute;right:-10px;top:0;bottom:0;width:120px;opacity:.18;
    background:repeating-linear-gradient(115deg,var(--asphalt) 0 14px,transparent 14px 30px)}
  .saved{background:var(--card);border-radius:26px;border:1px solid #ffffff10}
  .none{padding:34px 22px;text-align:center;color:var(--paint-dim);font-size:14px;line-height:1.5}
  .none b{color:var(--paint)}
  .meta{padding:22px 20px;display:flex;flex-direction:column;gap:12px}
  .when{font-size:12px;color:var(--paint-dim);font-weight:600;letter-spacing:.04em}
  .addr{font-size:20px;font-weight:800;letter-spacing:-.02em;line-height:1.25}
  .gpsbad{font-size:13px;color:var(--bad);font-weight:700}
  .row{display:flex;gap:10px;margin-top:6px}
  .row a,.row button{flex:1;text-decoration:none;text-align:center;border-radius:14px;
    padding:14px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;border:none}
  .map{background:var(--ok);color:#06281b}
  .del{background:#ffffff0c;color:var(--bad)}
</style>

<div class="top"><h1>Garée</h1><span class="tag">où suis-je</span></div>

<div class="wrap">
  <button class="park" id="park">
    <div class="stripes"></div>
    <div class="lbl">Je me gare ici</div>
    <div class="big" id="big">Enregistrer ma place</div>
  </button>
  <div class="saved" id="saved">
    <div class="none">Aucune place enregistrée.<br><b>Appuie sur le bouton</b> en sortant de la voiture.</div>
  </div>
</div>

<script>
const $=s=>document.querySelector(s);
function fmt(ts){const d=new Date(ts);
  return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})
    +' à '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}

async function load(){let s=null;
  try{const r=localStorage.getItem('spot');s=r?JSON.parse(r):null;}catch(e){}
  render(s);}

function render(s){const box=$('#saved');
  if(!s){box.innerHTML='<div class="none">Aucune place enregistrée.<br><b>Appuie sur le bouton</b> en sortant de la voiture.</div>';return;}
  if(s.lat==null){box.innerHTML=`<div class="meta">
      <div class="when">${fmt(s.ts)}</div>
      <div class="gpsbad">GPS indisponible — autorise la localisation</div>
      <div class="row"><button class="del" id="del">Supprimer</button></div></div>`;
    $('#del').onclick=del;return;}
  const lieu=s.addr||`${s.lat.toFixed(5)}, ${s.lng.toFixed(5)}`;
  box.innerHTML=`<div class="meta">
      <div class="when">Garée ${fmt(s.ts)}</div>
      <div class="addr">${lieu}</div>
      <div class="row">
        <a class="map" href="https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}" target="_blank">M'y ramener</a>
        <button class="del" id="del">Supprimer</button>
      </div></div>`;
  $('#del').onclick=del;}

async function del(){try{localStorage.removeItem('spot')}catch(e){}render(null);}
async function save(s){try{localStorage.setItem('spot',JSON.stringify(s))}catch(e){}render(s);}

async function reverse(lat,lng){
  try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`,
    {headers:{'Accept':'application/json'}});
    const j=await r.json();const a=j.address||{};
    const street=[a.house_number,a.road].filter(Boolean).join(' ');
    return [street, a.city||a.town||a.village||a.suburb].filter(Boolean).join(', ')||j.display_name;
  }catch(e){return null;}
}

$('#park').onclick=()=>{
  const btn=$('#park');btn.classList.add('busy');$('#big').textContent='Localisation…';
  const reset=()=>{btn.classList.remove('busy');$('#big').textContent='Enregistrer ma place';};
  const s={ts:Date.now(),lat:null,lng:null,acc:null,addr:null};
  if(!navigator.geolocation){reset();save(s);return;}
  navigator.geolocation.getCurrentPosition(async p=>{
    s.lat=p.coords.latitude;s.lng=p.coords.longitude;s.acc=p.coords.accuracy;
    save(s); // enregistre tout de suite
    s.addr=await reverse(s.lat,s.lng); // affine avec le lieu
    reset();save(s);
  },()=>{reset();save(s);},{enableHighAccuracy:true,timeout:8000});
};
load();
</script>
